name: Build Wheels for PyPI

on:
  push:
    tags:
      - '*'

jobs:
  build:
    uses: ./.github/workflows/_build_wheels.yaml

  upload_all:
    name: Upload wheels to PyPI
    needs: [build]
    runs-on: ubuntu-slim
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist

      - uses: astral-sh/setup-uv@v8.1.0

      - run: uv publish
